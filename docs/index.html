<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Closet Sale · Steph</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f3ef;
    color: #1a1a2e;
    padding-bottom: 120px;
    overflow-x: hidden;
  }
  header {
    position: sticky; top: 0; z-index: 50;
    background: #1a1a2e; color: #fff;
    padding: 12px 16px 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  h1 {
    font-size: 18px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  h1 .heart { color: #ff6b9d; }
  .search-wrap {
    position: relative; margin-top: 10px;
  }
  .search {
    width: 100%;
    padding: 12px 40px 12px 42px;
    border: none; border-radius: 24px;
    background: rgba(255,255,255,0.12);
    color: #fff; font-size: 16px;
    outline: none;
    -webkit-appearance: none;
  }
  .search::placeholder { color: rgba(255,255,255,0.55); }
  .search:focus { background: rgba(255,255,255,0.22); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    pointer-events: none; opacity: 0.6; font-size: 16px;
  }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    width: 24px; height: 24px;
    border: none; border-radius: 50%;
    background: rgba(255,255,255,0.25); color: #fff;
    font-size: 14px; line-height: 1;
    cursor: pointer; display: none;
    align-items: center; justify-content: center;
  }
  .search-clear.visible { display: flex; }

  .filters {
    display: flex; gap: 8px;
    overflow-x: auto; padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #e5e1d8;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .pill {
    flex-shrink: 0;
    padding: 6px 14px;
    border: 1px solid #d4cfc1;
    border-radius: 20px;
    background: #fff;
    font-size: 13px; font-weight: 500;
    color: #1a1a2e;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill.active {
    background: #1a1a2e; color: #fff; border-color: #1a1a2e;
  }
  .pill .count { opacity: 0.6; margin-left: 4px; font-size: 11px; }

  .filter-row-2 {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #e5e1d8;
  }
  .toggle-hide {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #555;
    cursor: pointer; user-select: none;
  }
  .toggle-hide input { width: 18px; height: 18px; accent-color: #1a1a2e; }
  .stats-mini {
    font-size: 12px; color: #888;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    padding: 12px;
  }
  @media (min-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; padding: 16px; }
  }
  @media (min-width: 900px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; max-width: 1100px; margin: 0 auto; }
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #e5e1d8;
    display: flex; flex-direction: column; gap: 6px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .card.sold {
    opacity: 0.5;
    background: #ecf5ec;
  }
  .card .prenda {
    font-size: 15px; font-weight: 600;
    line-height: 1.25;
  }
  .card .meta {
    display: flex; flex-wrap: wrap; gap: 6px 10px;
    font-size: 12px; color: #666;
  }
  .card .marca { font-style: italic; }
  .card .talla {
    background: #f5f3ef;
    padding: 2px 8px; border-radius: 4px;
    font-weight: 500; color: #1a1a2e;
  }
  .card .precio-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 6px;
  }
  .card .precio-lista {
    font-size: 13px; color: #888;
    text-decoration: line-through;
  }
  .card.sold .precio-lista { text-decoration: none; }
  .card .precio-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #d4cfc1;
    border-radius: 8px;
    font-size: 15px; font-weight: 600;
    color: #1a1a2e;
    background: #fafaf7;
    text-align: right;
    outline: none;
    -webkit-appearance: none;
  }
  .card .precio-input:focus {
    border-color: #1a1a2e;
    background: #fff;
  }
  .card .precio-prefix {
    font-size: 13px; color: #666;
  }
  .card .btn-sold {
    margin-top: 8px;
    padding: 12px;
    border: none; border-radius: 8px;
    background: #1a1a2e; color: #fff;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .card.sold .btn-sold {
    background: #4caf50;
  }
  .card .btn-sold:active { transform: scale(0.98); }

  .photo-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 4px;
  }
  .photo-thumb {
    width: 56px; height: 56px;
    border-radius: 8px;
    object-fit: cover;
    background: #f5f3ef;
    border: 1px solid #d4cfc1;
    cursor: pointer;
  }
  .btn-photo {
    flex: 1;
    padding: 10px;
    border: 1px dashed #b8b0a0;
    border-radius: 8px;
    background: #fafaf7;
    color: #555; font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
  }
  .btn-photo.has-photo {
    border-style: solid; border-color: #d4cfc1;
    background: #fff; color: #1a1a2e;
    font-weight: 500;
    padding: 8px 10px;
  }
  .btn-photo input { display: none; }

  .lightbox {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.92);
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 100%; max-height: 90vh;
    border-radius: 8px;
  }
  .lightbox-actions {
    position: absolute; top: env(safe-area-inset-top, 12px); right: 12px;
    display: flex; gap: 8px;
  }
  .lightbox-btn {
    padding: 10px 14px;
    border: none; border-radius: 8px;
    background: rgba(255,255,255,0.15); color: #fff;
    font-size: 13px; cursor: pointer;
    backdrop-filter: blur(8px);
  }
  .lightbox-btn.danger { background: rgba(255,82,82,0.5); }

  .badge-new {
    display: inline-block;
    background: #ff6b9d; color: #fff;
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px;
    margin-left: 6px; vertical-align: middle;
    letter-spacing: 0.3px;
  }
  .btn-remove {
    margin-top: 4px;
    background: transparent; color: #c62828;
    border: none;
    font-size: 12px; cursor: pointer;
    padding: 4px;
    text-align: center;
  }
  .btn-remove:active { opacity: 0.6; }

  .modal {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.5);
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal.open { display: flex; }
  @media (min-width: 600px) { .modal { align-items: center; } }
  .modal-card {
    background: #fff;
    width: 100%;
    max-width: 480px;
    border-radius: 16px 16px 0 0;
    padding: 20px 18px calc(20px + env(safe-area-inset-bottom, 0));
    box-shadow: 0 -8px 32px rgba(0,0,0,0.2);
  }
  @media (min-width: 600px) {
    .modal-card { border-radius: 16px; margin: 20px; }
  }
  .modal-card h2 {
    font-size: 18px; font-weight: 600;
    margin-bottom: 4px; color: #1a1a2e;
  }
  .modal-card .modal-note {
    font-size: 12px; color: #888;
    margin-bottom: 16px; line-height: 1.4;
  }
  .modal-card label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: #555;
    margin-bottom: 4px; margin-top: 12px;
  }
  .modal-card label .req { color: #ff6b9d; }
  .modal-card input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #d4cfc1;
    border-radius: 8px;
    font-size: 16px;
    color: #1a1a2e;
    background: #fafaf7;
    outline: none;
    -webkit-appearance: none;
  }
  .modal-card input:focus {
    border-color: #1a1a2e;
    background: #fff;
  }
  .modal-actions {
    display: flex; gap: 10px;
    margin-top: 20px;
  }
  .modal-actions button {
    flex: 1;
    padding: 14px;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  .btn-cancel {
    background: #f5f3ef; color: #555;
    border: 1px solid #e5e1d8 !important;
  }
  .btn-submit {
    background: #1a1a2e; color: #fff;
  }
  .btn-submit:disabled {
    background: #b8b0a0; cursor: not-allowed;
  }
  .bottom-bar .btn-add {
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 8px;
    background: transparent; color: #fff;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
  }

  .empty {
    grid-column: 1 / -1;
    padding: 40px 20px; text-align: center;
    color: #888; font-size: 14px;
  }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: #1a1a2e; color: #fff;
    padding: 14px 16px;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .bottom-bar .stats {
    display: flex; flex-direction: column; gap: 2px;
  }
  .bottom-bar .total {
    font-size: 22px; font-weight: 700;
    line-height: 1;
  }
  .bottom-bar .label {
    font-size: 11px; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .bottom-bar .counter {
    font-size: 13px; color: rgba(255,255,255,0.85);
  }
  .bottom-bar .actions {
    display: flex; gap: 8px;
  }
  .bottom-bar .btn-reset {
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    background: transparent; color: #fff;
    font-size: 12px; cursor: pointer;
  }
  .bottom-bar .btn-export {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: #ff6b9d; color: #fff;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
    <h1><span class="heart">♥</span> Closet Sale · Steph</h1>
    <button id="btn-refresh" style="padding:6px 12px;border:1px solid rgba(255,255,255,0.25);border-radius:8px;background:transparent;color:#fff;font-size:12px;cursor:pointer;">↻ Sync</button>
  </div>
  <div id="load-status" style="margin-top:6px;font-size:11px;color:rgba(255,255,255,0.7)">Cargando...</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" id="search" placeholder="Buscar prenda, marca, talla..." autocomplete="off" inputmode="search">
    <button class="search-clear" id="search-clear" aria-label="Limpiar búsqueda">✕</button>
  </div>
</header>

<div class="filters" id="cat-filters"></div>
<div class="filters" id="size-filters"></div>
<div class="filters" id="price-filters"></div>

<div class="filter-row-2">
  <label class="toggle-hide">
    <input type="checkbox" id="hide-sold">
    <span>Ocultar vendidos</span>
  </label>
  <span class="stats-mini" id="stats-mini"></span>
</div>

<div class="grid" id="grid"></div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-actions">
    <button class="lightbox-btn" id="lb-retake">Retomar</button>
    <button class="lightbox-btn danger" id="lb-delete">Borrar foto</button>
    <button class="lightbox-btn" id="lb-close">✕ Cerrar</button>
  </div>
  <img id="lightbox-img" alt="">
</div>

<div class="bottom-bar">
  <div class="stats">
    <span class="label">Vendido</span>
    <span class="total" id="total">$0</span>
    <span class="counter" id="counter">0 de 0 prendas</span>
  </div>
  <div class="actions">
    <button class="btn-add" id="btn-add">+ Agregar</button>
    <button class="btn-export" id="btn-export">Exportar</button>
    <button class="btn-reset" id="btn-reset">Reset</button>
  </div>
</div>

<div class="modal" id="modal-add">
  <div class="modal-card">
    <h2>Agregar prenda</h2>
    <div class="modal-note">Solo se guarda en este dispositivo. Si quieres que aparezca para todos, agrégalo en el Google Sheet.</div>
    <label>Prenda <span class="req">*</span></label>
    <input id="add-prenda" type="text" placeholder="Vestido azul corto" autocomplete="off">
    <label>Marca</label>
    <input id="add-marca" type="text" placeholder="Zara" autocomplete="off">
    <label>Talla</label>
    <input id="add-talla" type="text" placeholder="M" autocomplete="off">
    <label>Precio <span class="req">*</span></label>
    <input id="add-precio" type="number" inputmode="numeric" placeholder="150" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel-add">Cancelar</button>
      <button class="btn-submit" id="btn-submit-add" disabled>Agregar</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'steph_closet_v2';
const SHEET_ID = '1JE7iBPFmE7WJ1ObTprtaLBQxlWQqixdr-f_F_4vwh6A';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&t=${Date.now()}`;
const SHEET_VIEW_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;

let DATA = [];
const PRICE_RANGES = [
  { key: 'r1', label: '≤ $50',     min: 0,   max: 50 },
  { key: 'r2', label: '$51-100',   min: 51,  max: 100 },
  { key: 'r3', label: '$101-150',  min: 101, max: 150 },
  { key: 'r4', label: '$151-250',  min: 151, max: 250 },
  { key: 'r5', label: '$251+',     min: 251, max: Infinity }
];

let state = {
  search: '',
  category: 'all',
  size: 'all',
  priceRange: 'all',
  hideSold: false,
  sold: {},
  prices: {},
  photos: {},
  customItems: []
};
let currentPhotoId = null;

function categorize(prenda) {
  const p = (prenda || '').toLowerCase();
  if (p.includes('vestido')) return 'Vestidos';
  if (p.includes('blusa') || p.includes('camisa')) return 'Blusas';
  if (p.includes('jeans') || p.includes('pantalon') || p.includes('jegging')) return 'Jeans/Pantalones';
  if (p.includes('short')) return 'Shorts';
  if (p.includes('falda')) return 'Faldas';
  if (p.includes('top') || p.includes('crop')) return 'Tops';
  if (p.includes('leggings')) return 'Leggings';
  if (p.includes('sudadera') || p.includes('sueter') || p.includes('chamarra')) return 'Abrigos';
  if (p.includes('conjunto') || p.includes('jumpsuit') || p.includes('romper') || p.includes('traje')) return 'Conjuntos';
  if (p.includes('body')) return 'Bodys';
  if (p.includes('diadema') || p.includes('arete') || p.includes('collar') || p.includes('pulsera') || p.includes('bolsa') || p.includes('cinto')) return 'Accesorios';
  if (p.includes('zapato') || p.includes('tacon') || p.includes('bota') || p.includes('tenis')) return 'Calzado';
  return 'Otros';
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state.sold = saved.sold || {};
      state.prices = saved.prices || {};
      state.hideSold = !!saved.hideSold;
    }
    // Photos stored separately to keep state JSON small
    const rawPhotos = localStorage.getItem(STORAGE_KEY + '_photos');
    if (rawPhotos) state.photos = JSON.parse(rawPhotos) || {};
    // Custom items added from the app
    const rawCustom = localStorage.getItem(STORAGE_KEY + '_custom');
    if (rawCustom) state.customItems = JSON.parse(rawCustom) || [];
  } catch(e) { console.warn('loadState', e); }
}

function saveCustomItems() {
  localStorage.setItem(STORAGE_KEY + '_custom', JSON.stringify(state.customItems));
}

function rebuildData(baseItems) {
  // Merge sheet items + custom items, marking customs and applying categorize()
  const customMapped = state.customItems.map(it => ({ ...it, _custom: true }));
  const all = [...baseItems, ...customMapped];
  DATA = all.map(item => ({ ...item, _cat: categorize(item.prenda) }));
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    sold: state.sold,
    prices: state.prices,
    hideSold: state.hideSold
  }));
}

function savePhotos() {
  try {
    localStorage.setItem(STORAGE_KEY + '_photos', JSON.stringify(state.photos));
  } catch(e) {
    alert('Memoria del browser llena. Borra fotos de prendas ya vendidas tocando la foto y "Borrar foto".');
    console.error('savePhotos', e);
  }
}

function compressImage(file, maxW = 800, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handlePhotoFile(itemId, file) {
  if (!file) return;
  try {
    const dataUrl = await compressImage(file, 800, 0.75);
    state.photos[itemId] = dataUrl;
    savePhotos();
    renderGrid();
  } catch (e) {
    alert('No pude procesar la foto: ' + e.message);
  }
}

function openLightbox(itemId) {
  currentPhotoId = itemId;
  document.getElementById('lightbox-img').src = state.photos[itemId];
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  currentPhotoId = null;
}

function getFinalPrice(item) {
  if (state.prices[item.id] !== undefined && state.prices[item.id] !== null && state.prices[item.id] !== '') {
    return Number(state.prices[item.id]);
  }
  return item.precio;
}

function getFilteredItems() {
  const q = state.search.trim().toLowerCase();
  const range = state.priceRange !== 'all'
    ? PRICE_RANGES.find(r => r.key === state.priceRange)
    : null;
  return DATA.filter(item => {
    if (state.hideSold && state.sold[item.id]) return false;
    if (state.category !== 'all' && item._cat !== state.category) return false;
    if (state.size !== 'all' && item.talla !== state.size) return false;
    if (range && (item.precio < range.min || item.precio > range.max)) return false;
    if (q) {
      const blob = (item.prenda + ' ' + item.marca + ' ' + item.talla).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

function renderFilters() {
  const cats = {};
  const sizes = {};
  DATA.forEach(i => {
    cats[i._cat] = (cats[i._cat] || 0) + 1;
    if (i.talla) sizes[i.talla] = (sizes[i.talla] || 0) + 1;
  });

  const catEl = document.getElementById('cat-filters');
  catEl.innerHTML = '';
  const allCatPill = document.createElement('button');
  allCatPill.className = 'pill' + (state.category === 'all' ? ' active' : '');
  allCatPill.innerHTML = `Todo <span class="count">${DATA.length}</span>`;
  allCatPill.onclick = () => { state.category = 'all'; render(); };
  catEl.appendChild(allCatPill);

  Object.entries(cats).sort((a,b) => b[1] - a[1]).forEach(([cat, count]) => {
    const p = document.createElement('button');
    p.className = 'pill' + (state.category === cat ? ' active' : '');
    p.innerHTML = `${cat} <span class="count">${count}</span>`;
    p.onclick = () => { state.category = cat; render(); };
    catEl.appendChild(p);
  });

  const sizeEl = document.getElementById('size-filters');
  sizeEl.innerHTML = '';
  const allSizePill = document.createElement('button');
  allSizePill.className = 'pill' + (state.size === 'all' ? ' active' : '');
  allSizePill.textContent = 'Todas tallas';
  allSizePill.onclick = () => { state.size = 'all'; render(); };
  sizeEl.appendChild(allSizePill);

  Object.entries(sizes).sort((a,b) => b[1] - a[1]).forEach(([size, count]) => {
    const p = document.createElement('button');
    p.className = 'pill' + (state.size === size ? ' active' : '');
    p.innerHTML = `${size} <span class="count">${count}</span>`;
    p.onclick = () => { state.size = size; render(); };
    sizeEl.appendChild(p);
  });

  const priceEl = document.getElementById('price-filters');
  priceEl.innerHTML = '';
  const allPricePill = document.createElement('button');
  allPricePill.className = 'pill' + (state.priceRange === 'all' ? ' active' : '');
  allPricePill.textContent = 'Todos precios';
  allPricePill.onclick = () => { state.priceRange = 'all'; render(); };
  priceEl.appendChild(allPricePill);

  PRICE_RANGES.forEach(r => {
    const count = DATA.filter(i => i.precio >= r.min && i.precio <= r.max).length;
    if (count === 0) return;
    const p = document.createElement('button');
    p.className = 'pill' + (state.priceRange === r.key ? ' active' : '');
    p.innerHTML = `${r.label} <span class="count">${count}</span>`;
    p.onclick = () => { state.priceRange = r.key; render(); };
    priceEl.appendChild(p);
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const items = getFilteredItems();
  grid.innerHTML = '';

  if (items.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No hay prendas con esos filtros';
    grid.appendChild(empty);
    return;
  }

  items.forEach(item => {
    const isSold = !!state.sold[item.id];
    const finalPrice = getFinalPrice(item);
    const photo = state.photos[item.id];
    const card = document.createElement('div');
    card.className = 'card' + (isSold ? ' sold' : '');
    card.innerHTML = `
      <div class="prenda">${escapeHtml(item.prenda)}${item._custom ? '<span class="badge-new">Nuevo</span>' : ''}</div>
      <div class="meta">
        ${item.marca ? `<span class="marca">${escapeHtml(item.marca)}</span>` : ''}
        ${item.talla ? `<span class="talla">${escapeHtml(item.talla)}</span>` : ''}
      </div>
      <div class="photo-row">
        ${photo ? `<img class="photo-thumb" src="${photo}" data-photo-id="${item.id}" alt="">` : ''}
        <label class="btn-photo ${photo ? 'has-photo' : ''}">
          <span>${photo ? '📷 Cambiar foto' : '📷 Tomar foto'}</span>
          <input type="file" accept="image/*" capture="environment" data-photo-input="${item.id}">
        </label>
      </div>
      <div class="precio-row">
        <span class="precio-lista">$${item.precio}</span>
        <span class="precio-prefix">→ $</span>
        <input class="precio-input" type="number" inputmode="numeric"
               value="${state.prices[item.id] !== undefined ? state.prices[item.id] : item.precio}"
               data-id="${item.id}" placeholder="${item.precio}">
      </div>
      <button class="btn-sold" data-id="${item.id}">
        ${isSold ? '✓ Vendido · Toca para deshacer' : 'Marcar Vendido'}
      </button>
      ${item._custom ? `<button class="btn-remove" data-remove-id="${item.id}">🗑 Quitar prenda</button>` : ''}
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('.btn-sold').forEach(btn => {
    btn.onclick = (e) => {
      const id = e.currentTarget.dataset.id;
      if (state.sold[id]) {
        delete state.sold[id];
      } else {
        state.sold[id] = Date.now();
      }
      saveState();
      render();
    };
  });

  grid.querySelectorAll('.precio-input').forEach(inp => {
    inp.onchange = (e) => {
      const id = e.currentTarget.dataset.id;
      const v = e.currentTarget.value;
      if (v === '' || isNaN(Number(v))) {
        delete state.prices[id];
      } else {
        state.prices[id] = Number(v);
      }
      saveState();
      renderBottom();
    };
  });

  grid.querySelectorAll('input[data-photo-input]').forEach(inp => {
    inp.onchange = (e) => {
      const id = e.currentTarget.dataset.photoInput;
      const file = e.currentTarget.files && e.currentTarget.files[0];
      if (file) handlePhotoFile(id, file);
    };
  });

  grid.querySelectorAll('.photo-thumb').forEach(img => {
    img.onclick = (e) => openLightbox(e.currentTarget.dataset.photoId);
  });

  grid.querySelectorAll('.btn-remove').forEach(btn => {
    btn.onclick = (e) => {
      const id = e.currentTarget.dataset.removeId;
      if (!confirm('¿Quitar esta prenda agregada manualmente?')) return;
      state.customItems = state.customItems.filter(i => i.id !== id);
      delete state.sold[id];
      delete state.prices[id];
      delete state.photos[id];
      saveCustomItems();
      saveState();
      savePhotos();
      rebuildData(BASE_ITEMS);
      render();
    };
  });
}

function renderBottom() {
  const soldIds = Object.keys(state.sold);
  const soldItems = DATA.filter(i => state.sold[i.id]);
  const total = soldItems.reduce((sum, i) => sum + getFinalPrice(i), 0);

  document.getElementById('total').textContent = '$' + total.toLocaleString('es-MX');
  document.getElementById('counter').textContent = `${soldItems.length} de ${DATA.length} prendas`;
  document.getElementById('stats-mini').textContent =
    `${getFilteredItems().length} mostrando · ${soldItems.length} vendidos`;
}

function render() {
  renderFilters();
  renderGrid();
  renderBottom();
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

const searchEl = document.getElementById('search');
const searchClearEl = document.getElementById('search-clear');
searchEl.addEventListener('input', (e) => {
  state.search = e.target.value;
  searchClearEl.classList.toggle('visible', !!e.target.value);
  renderGrid();
  renderBottom();
});
searchClearEl.addEventListener('click', () => {
  searchEl.value = '';
  state.search = '';
  searchClearEl.classList.remove('visible');
  searchEl.focus();
  renderGrid();
  renderBottom();
});

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target.id === 'lightbox') closeLightbox();
});
document.getElementById('lb-delete').addEventListener('click', () => {
  if (!currentPhotoId) return;
  if (confirm('¿Borrar la foto de esta prenda?')) {
    delete state.photos[currentPhotoId];
    savePhotos();
    closeLightbox();
    renderGrid();
  }
});
document.getElementById('lb-retake').addEventListener('click', () => {
  if (!currentPhotoId) return;
  const id = currentPhotoId;
  closeLightbox();
  // Trigger the file input for that card
  const inp = document.querySelector(`input[data-photo-input="${id}"]`);
  if (inp) inp.click();
});

document.getElementById('hide-sold').addEventListener('change', (e) => {
  state.hideSold = e.target.checked;
  saveState();
  render();
});

// --- Add custom item modal ---
const modalAdd = document.getElementById('modal-add');
const addPrendaEl = document.getElementById('add-prenda');
const addMarcaEl = document.getElementById('add-marca');
const addTallaEl = document.getElementById('add-talla');
const addPrecioEl = document.getElementById('add-precio');
const btnSubmitAdd = document.getElementById('btn-submit-add');

function refreshSubmitState() {
  const ok = addPrendaEl.value.trim() && Number(addPrecioEl.value) > 0;
  btnSubmitAdd.disabled = !ok;
}

[addPrendaEl, addMarcaEl, addTallaEl, addPrecioEl].forEach(el => {
  el.addEventListener('input', refreshSubmitState);
});

function openAddModal() {
  addPrendaEl.value = '';
  addMarcaEl.value = '';
  addTallaEl.value = '';
  addPrecioEl.value = '';
  refreshSubmitState();
  modalAdd.classList.add('open');
  setTimeout(() => addPrendaEl.focus(), 100);
}

function closeAddModal() {
  modalAdd.classList.remove('open');
}

document.getElementById('btn-add').addEventListener('click', openAddModal);
document.getElementById('btn-cancel-add').addEventListener('click', closeAddModal);
modalAdd.addEventListener('click', (e) => {
  if (e.target === modalAdd) closeAddModal();
});

btnSubmitAdd.addEventListener('click', () => {
  const prenda = addPrendaEl.value.trim();
  const marca = addMarcaEl.value.trim();
  const talla = addTallaEl.value.trim();
  const precio = Math.round(Number(addPrecioEl.value));
  if (!prenda || !(precio > 0)) return;
  const id = stableId(prenda, marca, talla);
  // Prevent dup if same key already exists (sheet OR custom)
  if (DATA.some(i => i.id === id)) {
    if (!confirm('Ya existe una prenda con los mismos datos. ¿Agregar igualmente?')) return;
  }
  state.customItems.push({ id, prenda, marca, talla, precio });
  saveCustomItems();
  rebuildData(BASE_ITEMS);
  closeAddModal();
  render();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  const includePhotos = confirm('¿Resetear marcas de vendido y precios ajustados?\n\nOK = solo vendidos/precios (fotos se quedan)\nCancelar = no resetear nada');
  if (!includePhotos) return;
  state.sold = {};
  state.prices = {};
  saveState();
  render();
});

document.getElementById('btn-export').addEventListener('click', () => {
  const soldItems = DATA.filter(i => state.sold[i.id]).map(i => ({
    prenda: i.prenda,
    marca: i.marca,
    talla: i.talla,
    precio_lista: i.precio,
    precio_final: getFinalPrice(i)
  }));
  const total = soldItems.reduce((s, i) => s + i.precio_final, 0);
  let txt = `CLOSET SALE · ${new Date().toLocaleDateString('es-MX')}\n`;
  txt += `Total vendido: $${total.toLocaleString('es-MX')}\n`;
  txt += `Prendas: ${soldItems.length}\n\n`;
  soldItems.forEach((i, idx) => {
    txt += `${idx+1}. ${i.prenda}${i.marca ? ' · ' + i.marca : ''}${i.talla ? ' · T:' + i.talla : ''} · $${i.precio_final}\n`;
  });
  navigator.clipboard.writeText(txt).then(() => {
    alert('Copiado al portapapeles ✓');
  }).catch(() => {
    prompt('Copia esto:', txt);
  });
});

// CSV parser (simple, handles quoted fields with commas)
function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (inQuotes) {
      if (c === '"' && n === '"') { cell += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n' || c === '\r') {
        if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); row = []; cell = ''; }
        if (c === '\r' && n === '\n') i++;
      } else { cell += c; }
    }
  }
  if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
  return rows;
}

// Stable id from prenda+marca+talla (so reordering sheet doesn't break localStorage)
function stableId(prenda, marca, talla) {
  const s = `${prenda}|${marca}|${talla}`.toLowerCase().replace(/\s+/g, '');
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return 'i_' + Math.abs(h).toString(36);
}

function parsePrice(v) {
  if (!v) return 0;
  // Handle "$250.00", "250", "$ 250.00", etc.
  const m = String(v).replace(/[^\d.-]/g, '');
  const n = parseFloat(m);
  return isNaN(n) ? 0 : Math.round(n);
}

function rowsToItems(rows) {
  if (!rows || rows.length < 2) return [];
  const header = rows[0].map(h => h.trim().toUpperCase());
  const idxPrenda = header.indexOf('PRENDA');
  const idxMarca = header.indexOf('MARCA');
  const idxTalla = header.indexOf('TALLA');
  const idxPrecio = header.indexOf('PRECIO');
  const items = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    const prenda = (row[idxPrenda] || '').trim();
    if (!prenda) continue;
    const marca = idxMarca >= 0 ? (row[idxMarca] || '').trim().replace(/^-$/, '') : '';
    const talla = idxTalla >= 0 ? (row[idxTalla] || '').trim() : '';
    const precio = idxPrecio >= 0 ? parsePrice(row[idxPrecio]) : 0;
    if (precio === 0) continue; // skip summary row
    items.push({
      id: stableId(prenda, marca, talla),
      prenda, marca, talla, precio
    });
  }
  return items;
}

async function loadData() {
  const status = document.getElementById('load-status');
  status.textContent = 'Cargando lista del Sheet...';
  try {
    const r = await fetch(CSV_URL, { cache: 'no-store' });
    if (!r.ok) throw new Error('CSV HTTP ' + r.status);
    const txt = await r.text();
    const items = rowsToItems(parseCSV(txt));
    if (items.length === 0) throw new Error('CSV vacío');
    status.innerHTML = `<span style="color:#4caf50">✓ ${items.length} prendas del Sheet</span> · <a href="${SHEET_VIEW_URL}" target="_blank" style="color:#fff;text-decoration:underline">Editar</a>`;
    return items;
  } catch (e) {
    console.warn('Sheet fetch failed, fallback to data.json:', e);
    status.innerHTML = `<span style="color:#ffb74d">⚠ Sin internet, usando lista offline</span>`;
    const r = await fetch('data.json');
    return await r.json();
  }
}

let BASE_ITEMS = [];

document.getElementById('btn-refresh').addEventListener('click', async () => {
  BASE_ITEMS = await loadData();
  rebuildData(BASE_ITEMS);
  render();
});

(async () => {
  BASE_ITEMS = await loadData();
  loadState();
  rebuildData(BASE_ITEMS);
  document.getElementById('hide-sold').checked = state.hideSold;
  render();
})();
</script>
